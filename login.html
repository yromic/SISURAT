<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Edisi Premium SISURAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="assets/icon/Logo.ico" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #222831;
        overflow: hidden;
      }
      h1,
      h2,
      h3,
      h4,
      .font-outfit {
        font-family: "Outfit", sans-serif;
      }

      .mesh-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: #eeeeee;
        background-image:
          radial-gradient(at 0% 0%, hsla(183, 100%, 35%, 0.3) 0px, transparent 50%), radial-gradient(at 100% 0%, hsla(210, 18%, 16%, 0.4) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(183, 100%, 35%, 0.35) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(210, 18%, 26%, 0.4) 0px, transparent 50%);
        animation: breath 15s infinite alternate ease-in-out;
      }

      @keyframes breath {
        0% {
          background-position: 0% 0%;
        }
        100% {
          background-position: 100% 100%;
        }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      }

      .input-field {
        background: rgba(238, 238, 238, 0.6);
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }
      .input-field:focus {
        background: white;
        border-color: #00adb5;
        box-shadow: 0 0 0 4px rgba(0, 173, 181, 0.15);
      }

      .btn-login {
        position: relative;
        overflow: hidden;
        z-index: 1;
        transition: all 0.3s;
      }
      .btn-login::before {
        content: "";
        position: absolute;
        inset: 0;
        background: #393e46;
        z-index: -1;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s ease;
      }
      .btn-login:hover::before {
        transform: scaleX(1);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Dynamic Mesh Background -->
    <div class="mesh-bg"></div>

    <!-- Decorative blur elements -->
    <div class="absolute top-10 left-10 w-64 h-64 bg-[#00ADB5] rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
    <div class="absolute bottom-10 right-10 w-72 h-72 bg-[#222831] rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse delay-1000"></div>

    <div class="w-full max-w-5xl glass-card rounded-[2rem] overflow-hidden flex flex-col md:flex-row shadow-2xl relative z-10 transform hover:scale-[1.01] transition duration-500">
      <!-- Branding Side -->
      <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center text-left bg-gradient-to-br from-[#222831] to-[#393E46] relative overflow-hidden">
        <!-- Abstract shapes -->
        <div class="absolute -top-16 -left-16 w-32 h-32 bg-white opacity-5 rounded-full blur-xl border-4 border-[#00ADB5]"></div>
        <div class="absolute top-1/2 right-0 w-48 h-48 bg-[#00ADB5] opacity-20 rounded-full blur-2xl transform translate-x-1/2 -translate-y-1/2"></div>

        <div class="relative z-10 text-white">
          <div class="w-20 h-20 bg-white p-3 rounded-2xl shadow-lg mb-8 inline-flex items-center justify-center transform hover:rotate-6 transition">
            <img src="assets/icon/Logo.ico" alt="Logo" class="w-full h-full object-contain drop-shadow-sm" />
          </div>

          <h2 class="text-4xl md:text-5xl font-extrabold font-outfit mb-4 leading-tight">Selamat Datang<br /><span class="text-[#00ADB5]">Kembali.</span></h2>

          <p class="text-[#EEEEEE] opacity-80 text-sm md:text-base leading-relaxed mb-8 max-w-sm">Akses ekosistem SISURAT. Simpan, kelola, dan temukan dokumen dengan kecepatan kilat serta desain intuitif yang memanjakan mata.</p>

          <div class="flex items-center gap-3">
            <div class="flex -space-x-3">
              <div class="w-10 h-10 rounded-full bg-gray-300 border-2 border-[#222831] bg-[url('https://i.pravatar.cc/150?img=11')] bg-cover"></div>
              <div class="w-10 h-10 rounded-full bg-gray-300 border-2 border-[#222831] bg-[url('https://i.pravatar.cc/150?img=12')] bg-cover"></div>
              <div class="w-10 h-10 rounded-full bg-[#00ADB5] border-2 border-[#222831] flex items-center justify-center text-xs font-bold shadow-inner">+1k</div>
            </div>
            <p class="text-xs font-medium text-gray-300">Pengguna Aktif Bulan Ini</p>
          </div>
        </div>
      </div>

      <!-- Login Form Side -->
      <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center bg-white/50">
        <div class="max-w-sm w-full mx-auto">
          <div class="mb-8">
            <h3 class="text-2xl font-extrabold text-[#222831] font-outfit tracking-tight mb-2">Akses Akun Anda</h3>
            <p class="text-sm font-medium text-[#393E46]">Masukkan kredensial untuk melanjutkan.</p>
          </div>

          <form
            onsubmit="
              event.preventDefault();
              login();
            "
            class="space-y-6"
          >
            <div class="group">
              <label class="block text-xs font-bold text-[#393E46] uppercase tracking-wider mb-2 transition group-hover:text-[#00ADB5]">
                <i class="fas fa-user-circle mr-1 text-gray-400 group-hover:text-[#00ADB5] transition"></i> Username
              </label>
              <input id="username" type="text" placeholder="Masukkan username" class="input-field w-full px-5 py-3.5 rounded-xl text-[#222831] font-medium outline-none" required />
            </div>

            <div class="group">
              <label class="block text-xs font-bold text-[#393E46] uppercase tracking-wider mb-2 transition group-hover:text-[#00ADB5]"> <i class="fas fa-lock mr-1 text-gray-400 group-hover:text-[#00ADB5] transition"></i> Password </label>
              <input id="password" type="password" placeholder="••••••••" class="input-field w-full px-5 py-3.5 rounded-xl text-[#222831] font-medium outline-none tracking-widest" required />
            </div>

            <!-- Error Message Container (Must have id="msg" with a span inside) -->
            <div id="msg" class="hidden items-start gap-3 text-sm text-red-500 bg-red-50/80 p-4 rounded-xl border border-red-100 shadow-sm float-animation">
              <i class="fas fa-exclamation-triangle mt-0.5"></i>
              <span class="font-medium"></span>
            </div>

            <button id="login-btn" onclick="login()" type="button" class="btn-login w-full bg-[#00ADB5] text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 flex items-center justify-center gap-3">
              Sign In Securely <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <div class="text-center mt-8">
            <a
              href="index.html"
              class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-[#393E46] hover:text-[#00ADB5] transition-all bg-white hover:bg-gray-100 px-4 py-2 rounded-full shadow-sm border border-gray-100"
            >
              <i class="fas fa-home"></i> Kembali ke Beranda
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
